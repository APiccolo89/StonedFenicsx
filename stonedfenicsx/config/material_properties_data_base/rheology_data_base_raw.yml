#The rheology works using the following formulation:
#\eta = 0.5 * B^-1/n * \dot{\epsilon}^{(1-n)/n} * exp(-(E + PV)/nRT) * COH^-r/n/f_H20^r
#
#Where:
#- \eta is the viscosity
#- B is the pre-exponential factor
#- n is the stress exponent
#- E is the activation energy
#- P is the pressure
#- V is the activation volume
#- r is the water content exponent
#- COH is the water contentß
#- R is the gas constant
#- T is the temperature
#The data most of the time have different rheological apparatus, are listed with weird unit of measure
#the data base is conceived to put the relevant information to convert the pre-exponential factor into Pa^-n s^-1.

Diffusion_creep: 
  n: 1
  aH20: 1.0
  BH20: 5521e6 
  EH20: 31.28e3 
  VH20: -2.009e-5 

  Diffusion_DryOlivine: 
    B: 1.5e9
    E: 375.0e3
    V: 5e-6
    F: 'SimpleShear'
    d0: 10e3
    MPa: 1
    r: 0
    m: 3.0
    B_SI: 'MPa^-1s^-1'
    water_correction: 'None'
    ref: 'Hirth, Greg, and David Kohlstedt. "Rheology of the upper mantle and the mantle wedge: A view from the experimentalists." Geophysical monograph series 138 (2003): 83-105.'
  Diffusion_WetOlivine: 
    B: 2.7e7
    E: 375.0e3
    V: 10e-6
    F: 'SimpleShear'
    d0: 10e3
    MPa: 1
    r: 0.8
    m: 3.0
    B_SI: 'MPa^-1 s^-1 COH^-r'
    water_correction: 'COH'
    ref: 'Hirth, Greg, and David Kohlstedt. "Rheology of the upper mantle and the mantle wedge: A view from the experimentalists." Geophysical monograph series 138 (2003): 83-105.'
  Diffusion_vanKeken: 
    B: 3.7866452594987994e-10
    E: 335.0e3
    V: 0e-6
    F: 'None'
    d0: 1.0
    MPa: 0
    r: 0.8
    m: 1.0
    B_SI: 'Pa^-1 s^-1'
    water_correction: 'None'
    ref: 'van Keken, Peter E., et al. "A community benchmark for subduction zone modeling." Physics of the Earth and Planetary Interiors 171.1-4 (2008): 187-197.'
