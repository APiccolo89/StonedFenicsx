Input:
  NumericalControls:
    it_max: 20
    it_inner_max : 10 
    tol: 1.0e-5
    relax: 0.9
    temp_max: 1333.0
    temp_top: 0.0
    g: 9.81
    eta_max: 1.0e26
    v_s: [5.0, 0.0] # cm/yr
    slab_age: 50.0 # Myr
    time_max: 2.0  # Myr
    time_dependent_v: 0
    steady_state: 1
    tol_innerpic: 1.0e-2
    decoupling_ctrl: 1
    model_shear: "NoShear"
    time_dependent: 0
    dt: 0.015            # Myr (15000/1e6)
    adiabatic_heating: 0
    stokes_solver_type : "Iterative"
    energy_solver_type : "Direct"
    pressure_dependency: 1

  Shear_Heating: 
    phi: 5.0 
    cohesion: 10e6 
    dislocation_creep_wz: "WetQuartzite"
    
  InputOutputControl:
    test_name: "Output"
    sname: "Output"
    path_test: "../Results"

  # Scaling parameters
  scaling:
    length: 600
    stress: 1.0e9
    eta: 1.0e21
    temp: 1333.0

  # Left boundary condition
  thermal_boundary_condition:
    nz: 108
    end_time: 180.0
    dt: 0.001
    recalculate: 1
    van_keken: 1
    c_age_plate: 50.0
    self_consistent_flag: 1
    right_boundary : 'Continental'  # Oceanic 

  Material_properties: 
  
    subducting_plate_mantle:
      name_diffusion : 'Constant'
      name_dislocation : 'Constant'
      name_alpha : 'Constant'
      name_density : 'Constant'
      name_capacity: 'Constant'
      name_conductivity: 'Constant'
      eta : 1.0e20 
      rho0 : 3300.0 
      k : 3.0
      Cp : 1250 
      alpha0 : 3e-5
      b_dif : null
      b_dis : null 
      e_dif : null
      e_dis : null 
      v_dis : null 
      v_dis : null
      n : null
      radiative_conductivity : 0 
      radiogenic_heat : 0.0 

    wedge_mantle: 
      name_diffusion : 'Constant'
      name_dislocation : 'Constant'
      name_alpha : 'Constant'
      name_density : 'Constant'
      name_capacity: 'Constant'
