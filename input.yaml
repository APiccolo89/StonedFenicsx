# The input unit of measure: 
# Length = km -> all the unit of measure are in km and internally change to meter then dimensionless.
# Viscosity = Pas 
# Temperature = degC
# Velocity = cm/yr 
# Stress = Pascal 
# time = Myr 
# -> list of rheology and thermal model is given in the guide. 

Input:
  NumericalControls:
    it_max: 20
    it_inner_max : 10 
    tol: 1.0e-5
    relax: 0.9
    g: 9.81
    eta_max: 1.0e26
    time_max: 2.0  # Myr
    steady_state: 1
    tol_innerpic: 1.0e-2
    decoupling_ctrl: 1
    model_shear: "NoShear"
    dt: 0.015            # Myr (15000/1e6)
    adiabatic_heating: 0
    stokes_solver_type : "Iterative"
    energy_solver_type : "Direct"
    pressure_dependency: 1

  Shear_Heating: 
    shear_heating_disl_phi: 5.0 
    shear_heating_disl_ch: 0.0 
    shear_heating_disl_law: "Wet_Quartzite_2001_Dislocation_creep"
    
  InputOutputControl:
    test_name: "Output"
    sname: "Output"
    path_test: "../Results"

  # Scaling parameters
  scaling:
    length: 600
    stress: 1.0e9
    eta: 1.0e21
    temp: 1333.0

  # Left boundary condition
  thermal_boundary_condition:
    temp_max: 1300.0
    temp_top: 0.0
    constant: 1 
    interval_val : [50.0,30]
    interval_time: [20,40]
    nz: 108
    end_time: 180.0
    dt: 0.001
    slab_age: 50.0
    self_consistent_flag: 1
    right_boundary : 'Continental'  # Oceanic 
    recalculate : 0 # Option to compute on the fly the boundary -> useful if user wants to change thermal properties. 

  kinematic_boundary_condition:
    v_s : [5.0,0.0]
    constant : 1 
    interval_val : [5.0,1.0]
    interval_time : [20,40]

  Material_properties: 
  
    subducting_plate_mantle:
      name_diffusion : 'Constant'
      name_dislocation : 'Constant'
      name_alpha : 'Constant'
      name_density : 'Constant'
      name_capacity: 'Constant'
      name_conductivity: 'Constant'
      eta : 1.0e20 
      rho0 : 3300.0 
      k : 3.0
      cp : 1250 
      alpha0 : 3e-5
      b_dif : null
      b_dis : null 
      e_dif : null
      e_dis : null 
      v_dis : null 
      v_dif : null
      n : null
      radiative_conductivity : 0 
      radiogenic_heat : 0.0 

    wedge_mantle: 
      name_diffusion : 'Constant'
      name_dislocation : 'Constant'
      name_alpha : 'Constant'
      name_density : 'Constant'
      name_capacity: 'Constant'
      name_conductivity: 'Constant'
      eta : 1.0e20 
      rho0 : 3300.0 
      k : 3.0
      cp : 1250 
      alpha0 : 3e-5
      b_dif : null
      b_dis : null 
      e_dif : null
      e_dis : null 
      v_dis : null 
      v_dif : null
      n : null
      radiative_conductivity : 0 
      radiogenic_heat : 0.0 

    overriding_mantle: 
      name_diffusion : 'Constant'
      name_dislocation : 'Constant'
      name_alpha : 'Constant'
      name_density : 'Constant'
      name_capacity: 'Constant'
      name_conductivity: 'Constant'
      eta : 1.0e20 
      rho0 : 3300.0 
      k : 3.0
      cp : 1250 
      alpha0 : 3e-5
      b_dif : null
      b_dis : null 
      e_dif : null
      e_dis : null 
      v_dis : null 
      v_dif : null
      n : null
      radiative_conductivity : 0 
      radiogenic_heat : 0.0 

    oceanic_crust: 
      name_diffusion : 'Constant'
      name_dislocation : 'Constant'
      name_alpha : 'Constant'
      name_density : 'Constant'
      name_capacity: 'Constant'
      name_conductivity: 'Constant'
      eta : 1.0e20 
      rho0 : 3300.0 
      k : 3.0
      cp : 1250 
      alpha0 : 3e-5
      b_dif : null
      b_dis : null 
      e_dif : null
      e_dis : null 
      v_dis : null 
      v_dif : null
      n : null
      radiative_conductivity : 0 
      radiogenic_heat : 0.0 
      

    overriding_upper_crust:
      name_diffusion : 'Constant'
      name_dislocation : 'Constant'
      name_alpha : 'Constant'
      name_density : 'Constant'
      name_capacity: 'Constant'
      name_conductivity: 'Constant'
      eta : 1.0e20 
      rho0 : 3300.0 
      k : 3.0
      cp : 1250 
      alpha0 : 3e-5
      b_dif : null
      b_dis : null 
      e_dif : null
      e_dis : null 
      v_dis : null 
      v_dif : null
      n : null
      radiative_conductivity : 0 
      radiogenic_heat : 0.0 

    overriding_lower_crust:
      name_diffusion : 'Constant'
      name_dislocation : 'Constant'
      name_alpha : 'Constant'
      name_density : 'Constant'
      name_capacity: 'Constant'
      name_conductivity: 'Constant'
      eta : 1.0e20 
      rho0 : 3300.0 
      k : 3.0
      cp : 1250 
      alpha0 : 3e-5
      b_dif : null
      b_dis : null 
      e_dif : null
      e_dis : null 
      v_dis : null 
      v_dif : null
      n : null
      radiative_conductivity : 0 
      radiogenic_heat : 0.0 

  # Place holder for time-dependent left boundary condition
  # Geometry
  geometry:
    x: [0.0, 660.0] # Coordinate of X
    y: [-600.0, 0.0] # Coordinate of Y
    van_keken: True
    sub_constant_flag : True
    slab_tk: 130.0 # Slab Thickness
    cr: 30.0 # Overriding Crust {if lc==0.0 -> only overriding upper crust}
    ocr: 7.0 # Oceanic crust
    lc: 0.3
    resolution_normal: 3.0
    resolution_refine: 1.5 
    ns_depth: 50.0
    lab_d: 100.0
    decoupling: 80.0
    transition: 10.0
    wz_tk: 0.5
    sub_lb: 300.0
    sub_dl: 10.0
    sub_theta0: 5.0
    sub_theta_max: 45.0
    sub_trench: 0.0
    slab_type: "Custom" 
    sub_path: "Not Defined"
