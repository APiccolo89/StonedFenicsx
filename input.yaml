    t_age : [0.0,30.0]
    t_vel : [0.0,30.0]
    age_plate : [50.0, 25.0]
    vel_plate : [5.0, 2.5]


  # Geometry
  geometry:
    x: [0.0, 660000.0] # Coordinate of X
    y: [-600000.0, 0.0] # Coordinate of Y
    slab_tk: 130000.0 # Slab Thickness
    cr: 30000.0 # Overriding Crust {if lc==0.0 -> only overriding upper crust}
